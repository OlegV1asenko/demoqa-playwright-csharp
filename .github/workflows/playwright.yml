name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        
    - name: Build project
      run: dotnet build DemoQA/DemoQA.csproj

    - name: Cache Playwright Browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ runner.os }}-${{ hashFiles('**/DemoQA.csproj') }}
        restore-keys: |
          playwright-browsers-${{ runner.os }}-

    - name: Install Playwright Browsers & Dependencies
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: pwsh DemoQA/bin/Debug/net9.0/playwright.ps1 install --with-deps
      
    - name: Install System Dependencies Only
      if: steps.cache-playwright.outputs.cache-hit == 'true'
      run: pwsh DemoQA/bin/Debug/net9.0/playwright.ps1 install-deps
      
    - name: Run Tests
      continue-on-error: true 
      run: dotnet test DemoQA/DemoQA.csproj --logger "trx;LogFileName=test-results.trx"
      
    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: 🧪 Playwright Test Results
        path: '**/*.trx'
        reporter: dotnet-trx

    - name: Upload Playwright Traces
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-traces
        path: '**/*.zip'
        retention-days: 14